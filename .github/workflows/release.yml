name: Release

on:
  release:
    types: [published]

permissions:
  id-token: write
  attestations: write
  contents: write

jobs:
  attest-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout at release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack tarball
        run: npm pack

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'cve-lite-cli-*.tgz'

      - name: Upload tarball to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" cve-lite-cli-*.tgz --clobber
